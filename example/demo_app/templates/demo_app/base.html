{% load djgent_chat %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Djgent Demo{% endblock %}</title>
    <style>
        :root {
            --page-bg: #f5efe3;
            --page-ink: #1c1a17;
            --page-muted: #6e665e;
            --page-line: rgba(28, 26, 23, 0.12);
            --page-card: rgba(255, 252, 247, 0.88);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--page-ink);
            background:
                radial-gradient(circle at top left, rgba(14, 107, 87, 0.16), transparent 26%),
                linear-gradient(180deg, #f8f2e8 0%, var(--page-bg) 100%);
        }

        .page-shell {
            width: min(1080px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 72px;
        }

        .page-nav,
        .hero,
        .card-grid article {
            border: 1px solid var(--page-line);
            border-radius: 24px;
            background: var(--page-card);
            box-shadow: 0 18px 50px rgba(28, 26, 23, 0.08);
        }

        .page-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 20px;
            margin-bottom: 24px;
        }

        .page-nav a {
            color: inherit;
            text-decoration: none;
        }

        .hero {
            padding: 28px;
        }

        .eyebrow {
            margin: 0 0 10px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: var(--page-muted);
        }

        h1, h2, p { margin-top: 0; }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-top: 24px;
        }

        .card-grid article {
            padding: 20px;
        }

        .muted {
            color: var(--page-muted);
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <nav class="page-nav">
            <a href="{% url 'demo_app:home' %}"><strong>Djgent Demo</strong></a>
            <a href="{% url 'djgent_chat:home' %}">Open full chat page</a>
        </nav>
        {% block content %}{% endblock %}
    </div>
    {% djgent_chat_bubble %}
</body>
</html>
